name: Skill Check

on:
  pull_request:
    paths:
      - '.skills/**'
      - '.github/workflows/skill-check.yml'
  push:
    branches: [main]
    paths:
      - '.skills/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install skillforge
        run: pip install .

      - name: Validate skills
        run: skillforge validate --strict .skills/
